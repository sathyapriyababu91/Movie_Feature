<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Box</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-lg py-4" 
    style="border-bottom: 2px solid #ffc107;">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning d-flex align-items-center fs-3" href="#">
            <i class="fas fa-film me-2"></i> <span>THIRAI WORLD</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto gap-3">
                <button class="btn btn-sm btn-secondary fw-bold px-3" onclick="showall()">Show All</button>
                <button class="btn btn-sm btn-outline-light fw-bold px-3" onclick="filterGenre('action')">Action</button>
                <button class="btn btn-sm btn-outline-light fw-bold px-3" onclick="filterGenre('love')">Love</button>
                <button class="btn btn-sm btn-outline-light fw-bold px-3" onclick="filterGenre('comedy')">Comedy</button>
                <button class="btn btn-sm btn-outline-light fw-bold px-3" onclick="filterGenre('ghost')">Horror</button>
                <button class="btn btn-sm btn-warning fw-bold px-4 text-dark shadow" onclick="findTopRated()">
                    <i class="fas fa-star me-1"></i> Top Rated
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="row mb-4 justify-content-center py-4">
    <div class="col-md-6 d-flex gap-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Search the movie">
        <button class="btn btn-dark" onclick="searchMovie()">Search</button>
    </div>

    <div id="movie-container" class="row g-3"></div>
</div>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>    
</body>
</html>
